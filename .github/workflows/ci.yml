name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - run: npm test

  bun-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: npm run build
      - run: bun build --compile src/cli/index.ts --outfile /tmp/nectar-smoke
      - run: /tmp/nectar-smoke --version
      - run: /tmp/nectar-smoke --help
